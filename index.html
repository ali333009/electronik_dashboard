<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة تحكم إلكترونيك</title>

  <!-- Favicon (SVG inline) -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%236366f1'/><stop offset='100%25' stop-color='%238b5cf6'/></linearGradient></defs><rect width='64' height='64' rx='14' fill='url(%23g)'/><path d='M18 22h6l3 22h14l3-16H26' stroke='white' stroke-width='3' fill='none' stroke-linecap='round' stroke-linejoin='round'/><circle cx='29' cy='48' r='2.5' fill='white'/><circle cx='42' cy='48' r='2.5' fill='white'/></svg>" />

  <!-- Bootstrap 5 RTL + Icons + Fonts -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet" />

  <!-- App styles -->
  <link rel="stylesheet" href="style.css?v=2" />
</head>
<body>

  <!-- ====== Preloader ====== -->
  <div id="preloader" class="preloader">
    <div class="spinner-border text-primary" style="width:3rem;height:3rem;"></div>
    <p class="mt-3 text-muted">جاري تحميل لوحة التحكم...</p>
  </div>

  <!-- ====== Login View ====== -->
  <div id="login-view" class="login-view d-none">
    <div class="login-container">
      <div class="login-card">
        <div class="login-header text-center">
          <div class="login-logo mb-3">
            <i class="bi bi-bag-check-fill"></i>
          </div>
          <h3 class="fw-bold">لوحة تحكم إلكترونيك</h3>
          <p class="text-muted">سجّل دخولك للمتابعة إلى لوحة التحكم</p>
        </div>

        <form id="login-form" class="login-form">
          <div class="mb-3">
            <label class="form-label">البريد الإلكتروني</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-envelope"></i></span>
              <input type="email" id="login-email" class="form-control" placeholder="admin@example.com" required autocomplete="username" />
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">كلمة المرور</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" id="login-password" class="form-control" placeholder="••••••••" required autocomplete="current-password" />
              <button class="btn btn-outline-secondary" type="button" id="toggle-password">
                <i class="bi bi-eye"></i>
              </button>
            </div>
          </div>

          <div id="login-error" class="alert alert-danger d-none" role="alert"></div>

          <button type="submit" class="btn btn-primary w-100 py-2 fw-bold" id="login-btn">
            <span class="btn-text">تسجيل الدخول</span>
            <span class="spinner-border spinner-border-sm d-none" role="status"></span>
          </button>
        </form>

        <div class="login-footer text-center mt-4">
          <small class="text-muted">© 2026 لوحة تحكم إلكترونيك</small>
        </div>
      </div>
    </div>
  </div>

  <!-- ====== App Shell ====== -->
  <div id="app-shell" class="app-shell d-none">
    <aside id="sidebar" class="sidebar"></aside>
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <div class="main-wrapper">
      <header id="navbar" class="top-navbar"></header>
      <main id="main-content" class="main-content"></main>
      <footer class="app-footer text-center">
        <small class="text-muted">© 2026 لوحة تحكم إلكترونيك — جميع الحقوق محفوظة</small>
      </footer>
    </div>
  </div>

  <!-- ====== Modal & Toast Containers ====== -->
  <div id="modal-container"></div>
  <div class="toast-container position-fixed bottom-0 start-0 p-3" id="toast-container" style="z-index:1080;"></div>

  <!-- ====== Firebase SDK (compat) ====== -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-functions-compat.js"></script>

  <!-- SheetJS for Excel export -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <!-- Bootstrap Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- App Script -->
  <script src="app.js?v=2"></script>
</body>
</html>
